{{ define "main" }}
<div class="page-wrapper">
  <h1 class="page-title">Search</h1>
  <div id="search-container">
    <input type="text" id="search-input" placeholder="Search articles..." style="width:100%;border:1px solid var(--border);padding:0.6rem 1rem;font-family:var(--body);font-size:1rem;margin-bottom:2rem;">
    <div id="search-results"></div>
  </div>
</div>
<link rel="stylesheet" href="/pagefind/pagefind-ui.css">
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    new PagefindUI({
      element: '#search-container',
      showImages: true,
      resetStyles: false
    });
  });
</script>
{{ end }}
