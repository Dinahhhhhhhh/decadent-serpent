{{ define "main" }}
<div class="page-wrapper">
  <h1 class="page-title">{{ .Title }}</h1>
  <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:1.5rem;">
    {{ range .Data.Terms.Alphabetical }}
    <a href="{{ .Page.RelPermalink }}" style="font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--border);padding:0.35rem 0.75rem;color:var(--mid);transition:all 0.15s;">
      {{ .Page.Title }} ({{ .Count }})
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
